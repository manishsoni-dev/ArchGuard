name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://archguard:archguard@localhost:5432/archguard?schema=public
      REDIS_URL: redis://localhost:6379
      GITHUB_APP_ID: "1"
      GITHUB_WEBHOOK_SECRET: test-webhook-secret
      GITHUB_CLIENT_ID: test-client-id
      GITHUB_CLIENT_SECRET: test-client-secret
      DEV_WEBHOOK_TOKEN: test-dev-webhook-token
      ANALYZER_PROVIDER: mock
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: fake

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate test GitHub App private key
        run: |
          node - <<'NODE'
          const { generateKeyPairSync } = require('node:crypto');
          const { appendFileSync } = require('node:fs');
          const { privateKey } = generateKeyPairSync('rsa', {
            modulusLength: 2048,
            privateKeyEncoding: { type: 'pkcs1', format: 'pem' },
            publicKeyEncoding: { type: 'pkcs1', format: 'pem' }
          });
          appendFileSync(process.env.GITHUB_ENV, `GITHUB_PRIVATE_KEY=${privateKey.replace(/\n/g, '\\n')}\n`);
          NODE

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate --schema prisma/schema.prisma

      - name: Secret scan
        run: pnpm secrets:check

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Validate production env contract
        env:
          NODE_ENV: production
          PUBLIC_WEBHOOK_URL: https://archguard-ci.example.com
          ANALYZER_PROVIDER: rag
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: fake
        run: pnpm validate:prod-env

      - name: Build API Docker image
        run: pnpm docker:build:api

      - name: Build worker Docker image
        run: pnpm docker:build:worker
