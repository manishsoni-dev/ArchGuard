# Example template only. Adapt service names, regions, plans, and secret handling
# before using this on Render.
services:
  - type: web
    name: archguard-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANALYZER_PROVIDER
        value: rag
      - key: LLM_PROVIDER
        value: mock
      - key: EMBEDDING_PROVIDER
        value: fake
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: PUBLIC_WEBHOOK_URL
        sync: false

  - type: worker
    name: archguard-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANALYZER_PROVIDER
        value: rag
      - key: LLM_PROVIDER
        value: mock
      - key: EMBEDDING_PROVIDER
        value: fake
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: PUBLIC_WEBHOOK_URL
        sync: false
